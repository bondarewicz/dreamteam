name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "agents/**"
      - "scripts/build-site.ts"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Sync agent models into site
        run: bun scripts/build-site.ts

      - name: Inject commit SHA into site
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          sed -i "s/__COMMIT_SHA_SHORT__/${SHORT_SHA}/g" site/index.html
          sed -i "s/__COMMIT_SHA_FULL__/${GITHUB_SHA}/g" site/index.html
          echo "Injected commit ${SHORT_SHA} into site/index.html"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
