name: Standard Dream Team Workflow
description: Sequential execution flow for complex development tasks

phases:
  - phase: 1_domain_definition
    agent: dreamteam-jordan
    inputs:
      - business_goal
      - user_requirements
      - existing_domain_model
    outputs:
      - domain_rules
      - acceptance_criteria
      - business_invariants
    time_box: 30 minutes
    
  - phase: 2_architecture_design
    agent: dreamteam-bird
    inputs:
      - domain_rules (from jordan)
      - acceptance_criteria (from jordan)
      - existing_architecture
      - technical_constraints
    outputs:
      - architecture_proposal
      - key_trade_offs
      - flexibility_points
      - dependencies
    time_box: 45 minutes
    
  - phase: 3_task_breakdown
    agent: dreamteam-coach-k
    inputs:
      - acceptance_criteria (from jordan)
      - architecture_proposal (from bird)
      - timeline_constraints
      - team_capacity
    outputs:
      - task_breakdown
      - sequence_order
      - scope_decisions
      - time_boxes
    time_box: 30 minutes
    
  - phase: 4_implementation
    agent: dreamteam-shaq
    inputs:
      - task_breakdown (from coach-k)
      - architecture_proposal (from bird)
      - domain_rules (from jordan)
      - codebase_context
    outputs:
      - implementation
      - tests
      - migration_scripts
      - documentation
    time_box: variable (per task)
    
  - phase: 5_quality_review
    agent: dreamteam-kobe
    inputs:
      - implementation (from shaq)
      - acceptance_criteria (from jordan)
      - architecture_proposal (from bird)
    outputs:
      - critical_findings (max 3)
      - reproduction_scenarios
      - proposed_fixes
      - severity_ratings
    time_box: 30 minutes (enforced)
    constraints:
      max_findings: 3
      must_propose_fixes: true
    
  - phase: 6_stability_review
    agent: dreamteam-pippen
    inputs:
      - implementation (from shaq, updated post-kobe)
      - architecture_proposal (from bird)
      - production_environment_details
    outputs:
      - integration_assessment
      - observability_recommendations
      - monitoring_requirements
      - operational_checklist
    time_box: 30 minutes
    
  - phase: 7_synthesis
    agent: dreamteam-magic
    inputs:
      - all previous outputs
      - original requirements
      - timeline status
    outputs:
      - summary
      - key_decisions
      - handoff_notes
      - adr (if needed)
      - unresolved_items
    time_box: 20 minutes

iteration_rules:
  - if: kobe_critical_findings > 0
    then: return_to_shaq_for_fixes
    max_iterations: 2
    
  - if: pippen_critical_concerns > 0
    then: consult_bird_and_shaq
    max_iterations: 1
    
  - if: jordan_rejects_implementation
    then: return_to_phase_1
    escalate_to: coach-k

guardrails:
  - coach_k_can_override: all_agents
  - max_total_time: 4 hours
  - must_produce_shippable_increment: true
  - magic_produces_final_output: always

success_criteria:
  - jordan_accepts: true
  - kobe_critical_findings: 0
  - pippen_operational_readiness: true
  - coach_k_approves_ship: true
  - magic_synthesis_complete: true
